name: 'Docker Build and Push'
description: 'Builds a Docker image and optionally pushes it. Caller handles registry login.'

inputs:

  image-name:
    description: 'Full image name including registry e.g. myregistry.azurecr.io/my-app'
    required: true

  image-tag:
    description: 'Image tag.'
    required: true

  dockerfile-path:
    description: 'Path to the Dockerfile.'
    required: false
    default: './Dockerfile'

  build-context:
    description: 'Docker build context directory.'
    required: false
    default: '.'

  build-args:
    description: 'Additional --build-arg flags. Format: KEY=VALUE, one per line.'
    required: false
    default: ''

  push:
    description: 'Whether to push the image after building.'
    required: false
    default: 'true'

outputs:

  image-full-ref:
    description: 'Fully qualified image reference e.g. myregistry.azurecr.io/my-app:tag'
    value: ${{ steps.set-ref.outputs.image-full-ref }}

runs:
  using: 'composite'
  steps:

    - name: Build Docker image
      id: docker-build
      shell: bash
      run: |
        IMAGE="${{ inputs.image-name }}:${{ inputs.image-tag }}"

        BUILD_ARGS=""
        if [ -n "${{ inputs.build-args }}" ]; then
          while IFS= read -r line; do
            [ -n "$line" ] && BUILD_ARGS="$BUILD_ARGS --build-arg $line"
          done <<< "${{ inputs.build-args }}"
        fi

        docker build \
          -f "${{ inputs.dockerfile-path }}" \
          -t "$IMAGE" \
          $BUILD_ARGS \
          "${{ inputs.build-context }}"

        echo "IMAGE=$IMAGE" >> $GITHUB_ENV

    - name: Push Docker image
      if: ${{ inputs.push == 'true' }}
      shell: bash
      run: docker push "$IMAGE"

    - name: Set image reference output
      id: set-ref
      shell: bash
      run: |
        echo "image-full-ref=$IMAGE" >> $GITHUB_OUTPUT
        echo "Image: $IMAGE"
