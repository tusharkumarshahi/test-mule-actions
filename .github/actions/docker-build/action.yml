name: 'Docker Build and Push to ACR'
description: 'Builds a Docker image using BuildKit, optionally tags and pushes to Azure Container Registry.'

inputs:

  image-name:
    description: 'Image name e.g. my-app'
    required: true

  image-tag:
    description: 'Image tag — pass output from a previous step e.g. 1.0.0 or git SHA.'
    required: true

  dockerfile-path:
    description: 'Path to the Dockerfile.'
    required: false
    default: './Dockerfile'

  build-context:
    description: 'Docker build context directory.'
    required: false
    default: '.'

  build-args:
    description: 'Additional Docker build arguments. Format: KEY=VALUE, one per line.'
    required: false
    default: ''

  push:
    description: 'Whether to push the image to ACR. Set to false for build-only validation.'
    required: false
    default: 'false'

  acr-login-server:
    description: 'ACR login server URL e.g. myregistry.azurecr.io. Required when push is true.'
    required: false
    default: ''

  acr-username:
    description: 'ACR username. Required when push is true.'
    required: false
    default: ''

  acr-password:
    description: 'ACR password. Required when push is true.'
    required: false
    default: ''

outputs:

  image-full-ref:
    description: 'Fully qualified image reference e.g. myregistry.azurecr.io/my-app:1.0.0'
    value: ${{ steps.set-image-ref.outputs.image-full-ref }}

  image-digest:
    description: 'SHA256 digest of the pushed image. Only set when push is true.'
    value: ${{ steps.build-push.outputs.digest }}

runs:
  using: 'composite'
  steps:

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to ACR
      if: ${{ inputs.push == 'true' }}
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.acr-login-server }}
        username: ${{ inputs.acr-username }}
        password: ${{ inputs.acr-password }}

    - name: Build and push Docker image
      id: build-push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.build-context }}
        file: ${{ inputs.dockerfile-path }}
        push: ${{ inputs.push == 'true' }}
        tags: ${{ inputs.push == 'true' && format('{0}/{1}:{2}', inputs.acr-login-server, inputs.image-name, inputs.image-tag) || format('{0}:{1}', inputs.image-name, inputs.image-tag) }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set image reference output
      id: set-image-ref
      shell: bash
      run: |
        if [ "${{ inputs.push }}" == "true" ]; then
          FULL_REF="${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ inputs.image-tag }}"
        else
          FULL_REF="${{ inputs.image-name }}:${{ inputs.image-tag }}"
        fi
        echo "image-full-ref=$FULL_REF" >> $GITHUB_OUTPUT
        echo "Image: $FULL_REF"
